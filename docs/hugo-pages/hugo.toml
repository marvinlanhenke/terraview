baseURL = "https://marvinlanhenke.github.io/terraview/"
title = "Terraview"
languageCode = "en-us"
contentDir = "content/en"
defaultContentLanguage = "en"
defaultContentLanguageInSubdir = false
enableMissingTranslationPlaceholders = true
enableRobotsTXT = false
enableGitInfo = true

disableKinds = ["taxonomy", "term"]

[services]
  [services.disqus]
    shortname = ""

[module]
  [module.hugoVersion]
    extended = true
    min = "0.110.0"

[[module.imports]]
  path = "github.com/google/docsy"
  disable = false

[[module.imports]]
  path = "github.com/google/docsy/dependencies"
  disable = false

[outputs]
home = ["HTML", "RSS", "JSON"]

[params]
  offlineSearch = true
  github_repo = "https://github.com/marvinlanhenke/terraview"
  github_branch = "main"
  github_subdir = "docs/hugo-pages"
  ui_logo_maxwidth = 150
  ui_description = "Interactive terminal UI for exploring Terraform plan JSON."
  ui_author = "Marvin Lanhenke"
  privacy_policy = ""

  [params.ui]
    sidebar_menu_compact = true
    breadcrumb_disable = false
    sidebar_search_disable = false
    navbar_logo = true
    footer_about_enable = false
    showLightDarkModeMenu = true
    navbar_translucent_over_cover_disable = true
    footer_copyright_enable = true

  [params.ui.readingtime]
    enable = false

  [params.ui.feedback]
    enable = false

  [[params.links.user]]
    name = "GitHub Repository"
    url = "https://github.com/marvinlanhenke/terraview"
    icon = "fab fa-github"
    desc = "Source code and issues"

[[menu.main]]
  name = "Documentation"
  url = "/docs/"
  weight = 10

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    noClasses = false
    style = "tango"
    lineNos = false
  [markup.parser]
    [markup.parser.attribute]
      block = true
